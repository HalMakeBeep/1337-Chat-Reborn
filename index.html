<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1337 - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.5/dist/sweetalert2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/login.css" />
</head>

<body>
    <!-- Animated background orbs -->
    <div class="bg-orbs" aria-hidden="true">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="outer_div">
        <div class="container" id="container">
            <!-- Sign Up -->
            <div class="form-container sign-up-container">
                <form id="signUpForm">
                    <h1 class="title_h1">1337</h1>
                    <h4 class="title_h1 subtitle">Create Account</h4>
                    <span id="email_span">This info will be used as your login</span>
                    <input type="text" id="signUpName" name="name" placeholder="Username" required />
                    <input type="email" id="signUpEmail" name="email" placeholder="Email" required />
                    <input type="password" name="password" id="signUpPassword" placeholder="Password" required />
                    <input type="url" name="url" id="signUpUrl" placeholder="Profile Photo URL (optional)" />
                    <button type="submit">Sign Up</button>
                </form>
            </div>

            <!-- Sign In -->
            <div class="form-container sign-in-container">
                <form id="loginForm">
                    <h1 class="title_h1">1337</h1>
                    <h4 class="title_h1 subtitle">Welcome Back</h4>
                    <input type="email" name="email" id="loginEmail" placeholder="Email" required />
                    <input type="password" name="password" id="loginPassword" placeholder="Password" required />
                    <button type="submit">Sign In</button>
                </form>
            </div>

            <!-- Overlay -->
            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1 class="title_h1">Glad to have you!</h1>
                        <p class="p_tag">Enter your credentials and start chatting instantly.</p>
                        <button class="ghost" id="signIn">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1 class="title_h1">Hello, Friend!</h1>
                        <p class="p_tag">Don't have an account yet? Create one in seconds.</p>
                        <button class="ghost" id="signUp">Sign Up</button>
                    </div>
                </div>
            </div>

            <!-- Mobile tab switcher -->
            <div class="mobile-tabs">
                <button class="mobile-tab active" id="mobileSignIn">Sign In</button>
                <button class="mobile-tab" id="mobileSignUp">Sign Up</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.3/dist/sweetalert2.all.min.js"></script>
    <script src="./script/login.js"></script>
    <script>
        // Mobile tab switching
        const mobileSignIn = document.getElementById('mobileSignIn');
        const mobileSignUp = document.getElementById('mobileSignUp');
        if (mobileSignIn && mobileSignUp) {
            mobileSignUp.addEventListener('click', () => {
                document.getElementById('container').classList.add('right-panel-active');
                mobileSignUp.classList.add('active');
                mobileSignIn.classList.remove('active');
            });
            mobileSignIn.addEventListener('click', () => {
                document.getElementById('container').classList.remove('right-panel-active');
                mobileSignIn.classList.add('active');
                mobileSignUp.classList.remove('active');
            });
        }
    </script>
</body>

</html>
